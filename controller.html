<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Keep It Moving — Kontroller</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000028;
    --bgSub: #000a30;
    --accent: #00ffb9;
    --accentBright: #66ffd4;
    --accentDim: rgba(0,255,185,0.12);
    --white: #eaf2f8;
    --mid: #6b8a9e;
    --dim: #2a3f55;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); font-family: var(--sans); color: var(--white);
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .container {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 24px;
    position: relative;
  }

  /* Subtle brand lines */
  .brand-line { position: absolute; pointer-events: none; opacity: 0.04; }
  .brand-line.h1 { top: 25%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .brand-line.h2 { bottom: 25%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #00646e, transparent); }

  .header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .sie-logo-sm { height: 12px; opacity: 0.6; }
  .logo-sub { font-size: 8px; font-family: var(--mono); color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
  .conn { display: flex; align-items: center; gap: 6px; }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; }
  .conn-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .conn-dot.off { background: var(--dim); }
  .conn-label { font-size: 9px; font-family: var(--mono); color: var(--dim); letter-spacing: 1px; }

  .tap-btn {
    width: min(300px, 72vw); height: min(300px, 72vw);
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(0, 255, 185, 0.03);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease;
    position: relative;
  }
  .tap-btn:active {
    transform: scale(0.95);
    background: rgba(0, 255, 185, 0.1);
    box-shadow: 0 0 50px rgba(0, 255, 185, 0.12);
  }
  .tap-btn.disabled {
    border-color: var(--dim);
    background: transparent;
    cursor: default;
  }
  .tap-btn.disabled:active {
    transform: none;
    background: transparent;
    box-shadow: none;
  }

  .tap-icon {
    width: 44px; height: 44px;
    stroke: var(--accent); fill: none;
    transition: stroke 0.15s;
  }
  .tap-btn.disabled .tap-icon { stroke: var(--dim); }

  .tap-label {
    font-size: 18px; font-weight: 600;
    color: var(--accent); letter-spacing: 1px;
    text-transform: uppercase; font-family: var(--mono);
    transition: color 0.15s;
  }
  .tap-btn.disabled .tap-label { color: var(--dim); }

  .pulse-ring {
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
    pointer-events: none;
  }
  .pulse-ring.animate {
    animation: pulseOut 0.5s ease-out forwards;
  }
  @keyframes pulseOut {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.25); opacity: 0; }
  }

  .status {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px;
    text-align: center;
  }
  .status-phase {
    font-size: 12px; font-family: var(--mono);
    color: var(--dim); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .status-info {
    font-size: 11px; font-family: var(--mono);
    color: var(--dim); letter-spacing: 0.5px;
  }

  .game-progress {
    width: 80%; max-width: 280px;
    margin-top: 28px;
  }
  .game-progress-bar {
    height: 3px; border-radius: 2px;
    background: rgba(42,63,85,0.25);
  }
  .game-progress-fill {
    height: 100%; border-radius: 2px;
    background: var(--accent);
    transition: width 0.15s ease-out;
  }
  .game-progress-label {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-size: 11px; font-family: var(--mono); color: var(--dim);
  }

  /* Locked out state */
  .locked-msg {
    text-align: center; padding: 0 24px;
  }
  .locked-msg .title {
    font-size: 20px; font-weight: 600; color: var(--mid);
    margin-bottom: 8px;
  }
  .locked-msg .sub {
    font-size: 14px; color: var(--dim); font-family: var(--mono);
  }

  /* ============ NAME ENTRY OVERLAY ============ */
  .name-entry {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    background: rgba(0, 0, 40, 0.97);
    z-index: 100;
    gap: 16px;
  }
  .name-entry.hidden { display: none; }
  .name-entry .rank-badge {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
  }
  .name-entry .title {
    font-size: 26px; font-weight: 600; color: var(--white);
    text-align: center; line-height: 1.25;
  }
  .name-entry .sub {
    font-size: 13px; color: var(--mid);
    text-align: center; font-family: var(--mono);
    max-width: 280px; line-height: 1.5;
  }
  .name-entry .input-wrap {
    width: 100%; max-width: 320px;
    margin-top: 8px;
  }
  .name-entry input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 18px;
    font-family: var(--sans);
    color: var(--white);
    background: rgba(0, 10, 48, 0.8);
    border: 1.5px solid var(--accentDim);
    border-radius: 8px;
    outline: none;
    letter-spacing: 0.3px;
    -webkit-appearance: none;
    appearance: none;
  }
  .name-entry input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0, 255, 185, 0.2);
  }
  .name-entry input[type="text"]::placeholder {
    color: var(--dim);
    opacity: 1;
  }
  .name-entry .hint {
    font-size: 11px; font-family: var(--mono);
    color: var(--dim); letter-spacing: 0.5px;
    text-align: center;
  }
  .name-entry .error {
    font-size: 13px; color: #ff6680;
    font-family: var(--mono); letter-spacing: 0.3px;
    min-height: 18px; text-align: center;
  }
  .name-entry .submit-btn {
    min-width: 160px;
    padding: 14px 24px;
    font-size: 15px; font-weight: 600;
    font-family: var(--mono); letter-spacing: 2px;
    text-transform: uppercase;
    color: #000028;
    background: var(--accent);
    border: none; border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s;
  }
  .name-entry .submit-btn:active { transform: scale(0.96); }
  .name-entry .submit-btn:disabled {
    background: var(--dim); color: var(--mid);
    cursor: default;
  }
  .name-entry .success {
    font-size: 15px; color: var(--accent);
    font-family: var(--mono); letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="brand-line h1"></div>
  <div class="brand-line h2"></div>

  <div class="header">
    <div class="logo">
      <svg class="sie-logo-sm" viewBox="0 0 1000 159" xmlns="http://www.w3.org/2000/svg"><g><path fill="rgba(255,255,255,0.5)" d="M3.086,152.537V122.46c17.119,5.388,32.267,8.082,45.444,8.082c18.193,0,27.291-4.809,27.291-14.42c0-3.583-1.324-6.594-3.978-9.032c-2.714-2.586-9.665-6.171-20.835-10.764c-20.042-8.241-33.111-15.269-39.19-21.082C3.939,67.571,0,57.895,0,46.202C0,31.144,5.74,19.667,17.212,11.78C28.557,3.962,43.33,0.057,61.554,0.057c10.041,0,24.574,1.848,43.583,5.549v28.933c-14.144-5.65-27.273-8.469-39.403-8.469c-17.081,0-25.621,4.69-25.621,14.091c0,3.514,1.72,6.38,5.165,8.602c2.865,1.798,10.759,5.596,23.665,11.406c18.583,8.253,30.954,15.427,37.118,21.529c7.314,7.238,10.978,16.604,10.978,28.084c0,16.501-7.177,29.088-21.521,37.761c-11.621,7.033-26.69,10.535-45.198,10.535C34.69,158.078,18.942,156.237,3.086,152.537z"/><polygon fill="rgba(255,255,255,0.5)" points="141.063,2.704 183.603,2.704 183.603,155.001 141.063,155.001"/><polygon fill="rgba(255,255,255,0.5)" points="222.616,155.001 222.616,2.704 331.721,2.704 331.721,30.25 263.616,30.25 263.616,64.639 322.898,64.639 322.898,89.765 263.616,89.765 263.616,125.906 333.476,125.906 333.476,155.001"/><polygon fill="rgba(255,255,255,0.5)" points="361.247,155.001 361.247,2.704 416.402,2.704 454.721,100.015 494.001,2.704 546.39,2.704 546.39,155.001 506.056,155.001 506.056,47.171 461.392,156.547 435.023,156.547 391.219,47.171 391.219,155.001"/><polygon fill="rgba(255,255,255,0.5)" points="585.411,155.001 585.411,2.704 694.514,2.704 694.514,30.25 626.415,30.25 626.415,64.639 685.695,64.639 685.695,89.765 626.415,89.765 626.415,125.906 696.28,125.906 696.28,155.001"/><polygon fill="rgba(255,255,255,0.5)" points="724.271,155.001 724.271,2.704 773.575,2.704 825.883,104.655 825.883,2.704 855.847,2.704 855.847,155.001 807.943,155.001 754.247,51.678 754.247,155.001"/><path fill="rgba(255,255,255,0.5)" d="M886.047,152.537V122.46c16.974,5.388,32.12,8.082,45.452,8.082c18.195,0,27.282-4.809,27.282-14.42c0-3.583-1.289-6.594-3.854-9.032c-2.728-2.586-9.708-6.171-20.945-10.764c-19.982-8.173-33.064-15.198-39.199-21.082c-7.875-7.605-11.807-17.317-11.807-29.146c0-14.993,5.726-26.432,17.21-34.319c11.328-7.818,26.118-11.723,44.344-11.723c10.247,0,23.525,1.627,39.81,4.896l3.761,0.653v28.933c-14.146-5.65-27.313-8.469-39.508-8.469c-17.016,0-25.503,4.69-25.503,14.091c0,3.514,1.711,6.38,5.147,8.602c2.73,1.729,10.656,5.529,23.778,11.406c18.442,8.253,30.787,15.427,37.005,21.529c7.325,7.238,10.98,16.604,10.98,28.084c0,16.501-7.135,29.088-21.406,37.761c-11.689,7.033-26.796,10.535-45.301,10.535C917.646,158.078,901.891,156.237,886.047,152.537z"/></g></svg>
    </div>
    <div class="conn">
      <div class="conn-dot off" id="connDot"></div>
      <span class="conn-label" id="connLabel">KOBLER TIL</span>
    </div>
  </div>

  <div class="tap-btn disabled" id="tapBtn">
    <div class="pulse-ring" id="pulseRing"></div>
    <svg class="tap-icon" viewBox="0 0 48 48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="14" r="4"/>
      <path d="M24 20v8"/>
      <path d="M18 28l6 8 6-8"/>
      <path d="M12 38h24"/>
    </svg>
    <span class="tap-label" id="tapLabel">Venter</span>
  </div>

  <div class="game-progress" id="gameProgress" style="visibility:hidden">
    <div class="game-progress-bar">
      <div class="game-progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="game-progress-label">
      <span id="progPct">0%</span>
      <span id="progTaps">0 trykk</span>
    </div>
  </div>

  <div id="lockedMsg" class="locked-msg" style="display:none">
    <div class="title">Spillet er opptatt</div>
    <div class="sub">Vent til neste runde</div>
  </div>

  <div class="status">
    <div class="status-phase" id="statusPhase">Kobler til skjermen...</div>
    <div class="status-info">Keep It Moving — <span id="sessionLabel"></span></div>
  </div>

  <!-- Name entry overlay (shown only when display confirms qualification) -->
  <div class="name-entry hidden" id="nameEntry">
    <div class="rank-badge" id="rankBadge">TOPP 10</div>
    <div class="title">Gratulerer!</div>
    <div class="sub">Du kom på topplisten. Skriv inn bedriftsnavn for å lagre resultatet.</div>
    <div class="input-wrap">
      <input type="text" id="companyInput" placeholder="Bedriftsnavn" maxlength="24" autocomplete="off" autocapitalize="words" spellcheck="false" />
    </div>
    <div class="hint">2–24 tegn · bokstaver, tall, mellomrom, . - &amp;</div>
    <div class="error" id="nameError"></div>
    <button type="button" class="submit-btn" id="submitName">Send inn</button>
    <div class="success hidden" id="nameSuccess"></div>
  </div>

</div>

<script>
const tapBtn = document.getElementById("tapBtn");
const tapLabel = document.getElementById("tapLabel");
const pulseRing = document.getElementById("pulseRing");
const connDot = document.getElementById("connDot");
const connLabel = document.getElementById("connLabel");
const statusPhase = document.getElementById("statusPhase");
const gameProgress = document.getElementById("gameProgress");
const progressFill = document.getElementById("progressFill");
const progPct = document.getElementById("progPct");
const progTaps = document.getElementById("progTaps");
const lockedMsg = document.getElementById("lockedMsg");
const nameEntry = document.getElementById("nameEntry");
const rankBadge = document.getElementById("rankBadge");
const companyInput = document.getElementById("companyInput");
const nameError = document.getElementById("nameError");
const nameSuccess = document.getElementById("nameSuccess");
const submitNameBtn = document.getElementById("submitName");

// =====================================================================
// SESSION / IDENTITY — declared FIRST so any later code can safely use them.
// The previous version referenced SESSION_ID before its const-declaration,
// triggering a ReferenceError (TDZ) and halting the whole script — which is
// why the controller was stuck on "Kobler til skjermen...".
// =====================================================================
const urlParams = new URLSearchParams(window.location.search);
const SESSION_ID = urlParams.get("s") || "default";
const CHANNEL_NAME = "kim-" + SESSION_ID;

// Persistent per-session controllerId so reloads preserve ownership.
const STORAGE_KEY = "kim_controllerId_" + SESSION_ID;
let controllerId = null;
try { controllerId = localStorage.getItem(STORAGE_KEY); } catch (e) {}
if (!controllerId) {
  controllerId = "ctrl-" + Math.random().toString(36).substr(2, 9);
  try { localStorage.setItem(STORAGE_KEY, controllerId); } catch (e) {}
}

console.log("[CTRL] startup", { controllerId, SESSION_ID, CHANNEL_NAME });

// Show session info
document.getElementById("sessionLabel").textContent = SESSION_ID === "default" ? "ingen sesjon" : "sesjon " + SESSION_ID;

// If no session ID provided, show error state
if (SESSION_ID === "default") {
  statusPhase.textContent = "Skann QR-koden på skjermen";
  tapBtn.classList.add("disabled");
  tapLabel.textContent = "Venter";
}

let connected = false;
let gamePhase = "intro";
let channel = null;
let isActivePlayer = false;
let lastJoinRequestAt = 0;
let pendingQualification = null; // { runId, rank, completed } — set by display's qualify_prompt

const NAME_RE = /^[A-Za-zÆØÅæøå0-9 .&\-]+$/;

function validateCompanyName(raw) {
  if (typeof raw !== "string") return { ok: false, error: "Ugyldig navn" };
  const cleaned = raw.trim().replace(/\s+/g, " ");
  if (cleaned.length < 2) return { ok: false, error: "Navnet må være minst 2 tegn" };
  if (cleaned.length > 24) return { ok: false, error: "Navnet kan maks være 24 tegn" };
  if (!NAME_RE.test(cleaned)) return { ok: false, error: "Navnet inneholder ugyldige tegn" };
  return { ok: true, value: cleaned };
}

function showNameEntry(rank) {
  rankBadge.textContent = "TOPP 10 · RANG #" + rank;
  companyInput.value = "";
  nameError.textContent = "";
  nameSuccess.classList.add("hidden");
  nameSuccess.textContent = "";
  submitNameBtn.disabled = false;
  submitNameBtn.textContent = "Send inn";
  nameEntry.classList.remove("hidden");
  setTimeout(() => companyInput.focus(), 50);
}

function hideNameEntry() {
  nameEntry.classList.add("hidden");
  nameError.textContent = "";
  nameSuccess.classList.add("hidden");
  companyInput.value = "";
}

// =====================================================================
// SUPABASE REALTIME
// =====================================================================
const SUPABASE_URL = "https://axqnrakxsegitwrgvshu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4cW5yYWt4c2VnaXR3cmd2c2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTM5MzEsImV4cCI6MjA5MTEyOTkzMX0.wpCrYzKmnSA2G6TAs1w1SKxyhsJ51NkbOirYM85uRhU";

function sendJoinRequest() {
  if (!channel || !connected) return;
  const now = Date.now();
  if (now - lastJoinRequestAt < 500) return; // debounce
  lastJoinRequestAt = now;
  channel.send({ type: "broadcast", event: "join_request", payload: { controllerId } });
  console.log("[CTRL] join_request sent", controllerId);
}

async function connectSupabase() {
  if (SESSION_ID === "default") return;

  statusPhase.textContent = "Kobler til: " + CHANNEL_NAME;

  if (typeof supabase === "undefined" || !supabase.createClient) {
    statusPhase.textContent = "Feil: Supabase-bibliotek ikke lastet";
    connLabel.textContent = "FEIL";
    console.error("[CTRL] Supabase JS library not loaded");
    return;
  }

  try {
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
      realtime: { params: { eventsPerSecond: 10 } }
    });

    channel = sb.channel(CHANNEL_NAME, {
      config: { broadcast: { self: false } },
    });

    channel.on("broadcast", { event: "state" }, ({ payload }) => {
      gamePhase = payload.phase;
      const wasOwner = isActivePlayer;

      if (payload.activePlayer === controllerId) {
        isActivePlayer = true;
      } else {
        if (wasOwner) console.log("[CTRL] owner cleared (no longer me)");
        isActivePlayer = false;
      }

      // If display reports no active owner and we're in intro, try to claim.
      if (!payload.activePlayer && gamePhase === "intro" && connected) {
        sendJoinRequest();
      }

      updateUI();

      if (isActivePlayer && payload.phase === "game") {
        const pct = Math.round(payload.progress * 100);
        progressFill.style.width = pct + "%";
        progPct.textContent = pct + "%";
        progTaps.textContent = payload.taps + " trykk";
      }
    });

    channel.on("broadcast", { event: "qualify_prompt" }, ({ payload }) => {
      if (!payload || payload.controllerId !== controllerId) return;
      console.log("[CTRL] qualify_prompt received", payload);
      pendingQualification = {
        runId: payload.runId,
        rank: payload.rank,
        completed: !!payload.completed,
      };
      showNameEntry(payload.rank);
    });

    channel.on("broadcast", { event: "name_result" }, ({ payload }) => {
      if (!payload || payload.controllerId !== controllerId) return;
      if (!pendingQualification || pendingQualification.runId !== payload.runId) return;
      console.log("[CTRL] name_result received", payload);
      if (payload.success) {
        nameError.textContent = "";
        nameSuccess.textContent = "Lagret! " + (payload.companyName || "") + " · rang " + (payload.rank || pendingQualification.rank);
        nameSuccess.classList.remove("hidden");
        submitNameBtn.disabled = true;
        submitNameBtn.textContent = "Lagret";
        pendingQualification = null;
        setTimeout(() => hideNameEntry(), 2500);
      } else {
        nameError.textContent = payload.message || "Kunne ikke lagre";
        submitNameBtn.disabled = false;
        submitNameBtn.textContent = "Send inn";
      }
    });

    channel.on("broadcast", { event: "join_response" }, ({ payload }) => {
      if (!payload || payload.controllerId !== controllerId) return;
      console.log("[CTRL] join_response received", payload);
      if (payload.accepted) {
        console.log("[CTRL] owner assigned");
        isActivePlayer = true;
        lockedMsg.style.display = "none";
      } else {
        console.log("[CTRL] owner rejected");
        isActivePlayer = false;
      }
      updateUI();
    });

    channel.subscribe((status, err) => {
      console.log("[CTRL] channel status:", status, err || "");
      if (status === "SUBSCRIBED") {
        connected = true;
        connDot.className = "conn-dot on";
        connLabel.textContent = "TILKOBLET";
        statusPhase.textContent = "Venter på tilgang...";
        sendJoinRequest();
        updateUI();
      } else if (status === "CHANNEL_ERROR") {
        connected = false;
        connDot.className = "conn-dot off";
        connLabel.textContent = "FEIL";
        statusPhase.textContent = "Tilkoblingsfeil: " + (err || "ukjent");
        console.error("[CTRL] channel error", err);
      } else if (status === "TIMED_OUT") {
        connected = false;
        connDot.className = "conn-dot off";
        connLabel.textContent = "TIDSAVBRUDD";
        statusPhase.textContent = "Tidsavbrudd — last siden på nytt";
      } else if (status === "CLOSED") {
        connected = false;
        connDot.className = "conn-dot off";
        connLabel.textContent = "LUKKET";
        statusPhase.textContent = "Tilkobling lukket";
      } else {
        connDot.className = "conn-dot off";
        connLabel.textContent = status;
      }
    });
  } catch (e) {
    statusPhase.textContent = "Feil: " + e.message;
    connLabel.textContent = "FEIL";
    console.error("[CTRL] connectSupabase error:", e);
  }
}

// Ensure Supabase library is loaded before connecting
if (document.readyState === "complete") {
  connectSupabase();
} else {
  window.addEventListener("load", connectSupabase);
}

// =====================================================================
// UI STATE
// =====================================================================
function updateUI() {
  if (!connected) return;

  const locked = !isActivePlayer && gamePhase !== "intro";

  if (locked && (gamePhase === "game" || gamePhase === "countdown")) {
    tapBtn.classList.add("disabled");
    tapLabel.textContent = "Opptatt";
    lockedMsg.style.display = "block";
    gameProgress.style.visibility = "hidden";
    statusPhase.textContent = "";
    return;
  }

  lockedMsg.style.display = "none";

  switch (gamePhase) {
    case "intro":
      tapBtn.classList.remove("disabled");
      if (isActivePlayer) {
        tapLabel.textContent = "Start";
        statusPhase.textContent = "Trykk for å starte";
      } else {
        tapLabel.textContent = "Venter";
        statusPhase.textContent = "Venter på tilgang...";
      }
      gameProgress.style.visibility = "hidden";
      break;
    case "countdown":
      if (isActivePlayer) {
        tapBtn.classList.add("disabled");
        tapLabel.textContent = "Klar...";
        statusPhase.textContent = "Se på skjermen!";
        gameProgress.style.visibility = "hidden";
      }
      break;
    case "game":
      if (isActivePlayer) {
        tapBtn.classList.remove("disabled");
        tapLabel.textContent = "Trykk";
        statusPhase.textContent = "Send kraft til toget";
        gameProgress.style.visibility = "visible";
      }
      break;
    case "results":
      if (isActivePlayer) {
        tapBtn.classList.remove("disabled");
        tapLabel.textContent = "Igjen";
        statusPhase.textContent = "Trykk for å spille igjen";
        gameProgress.style.visibility = "hidden";
      } else {
        tapBtn.classList.remove("disabled");
        tapLabel.textContent = "Venter";
        statusPhase.textContent = "Venter på neste runde";
        gameProgress.style.visibility = "hidden";
        lockedMsg.style.display = "none";
      }
      break;
  }
}

// =====================================================================
// TAP HANDLING
// =====================================================================
function sendTap() {
  if (!connected || !channel) return;
  if (tapBtn.classList.contains("disabled")) return;

  // If we aren't the owner, don't send a tap — request ownership instead.
  if (!isActivePlayer) {
    console.log("[CTRL] tap blocked — not owner. Requesting ownership.");
    sendJoinRequest();
    return;
  }

  channel.send({ type: "broadcast", event: "tap", payload: { controllerId } });
  console.log("[CTRL] tap sent");

  pulseRing.classList.remove("animate");
  void pulseRing.offsetWidth;
  pulseRing.classList.add("animate");
}

tapBtn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  sendTap();
}, { passive: false });

tapBtn.addEventListener("click", (e) => {
  e.preventDefault();
  sendTap();
});

document.addEventListener("dblclick", (e) => e.preventDefault());
document.addEventListener("touchmove", (e) => {
  // Allow touchmove inside the name entry input so iOS selection/scroll works
  if (nameEntry && !nameEntry.classList.contains("hidden")) return;
  e.preventDefault();
}, { passive: false });

// =====================================================================
// NAME ENTRY SUBMIT
// =====================================================================
function submitCompanyName() {
  if (!pendingQualification) return;
  if (!channel || !connected) {
    nameError.textContent = "Ikke tilkoblet";
    return;
  }
  const v = validateCompanyName(companyInput.value);
  if (!v.ok) {
    nameError.textContent = v.error;
    return;
  }
  nameError.textContent = "";
  submitNameBtn.disabled = true;
  submitNameBtn.textContent = "Sender...";
  console.log("[CTRL] name_submit sent", { runId: pendingQualification.runId, name: v.value });
  channel.send({ type: "broadcast", event: "name_submit", payload: {
    controllerId,
    runId: pendingQualification.runId,
    name: v.value,
  }});
}

submitNameBtn.addEventListener("click", (e) => {
  e.preventDefault();
  submitCompanyName();
});

companyInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    submitCompanyName();
  }
});

// Clear any pending name-entry when the round resets (display went back to intro
// without us submitting, countdown of a new round starts, or we lost ownership).
function clearPendingNameEntryIfStale() {
  const entryOpen = !nameEntry.classList.contains("hidden");
  if (!entryOpen) return;
  if (gamePhase !== "results") {
    console.log("[CTRL] round reset — closing stale name entry");
    pendingQualification = null;
    hideNameEntry();
  }
}
setInterval(clearPendingNameEntryIfStale, 500);
</script>
